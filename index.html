<!DOCTYPE html>
<html>
    <head>
        <meta viewport content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">
        <link href="./style.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <header>
            <img id="header-logo" src="https://cdn-icons-png.flaticon.com/512/2912/2912384.png">
            <a id="header-title" href="./index.html">кроссы и точка.</a>
        </header>
        <main>
            <div id="sneakers-container">
                <div id="nike-polaroid" class="sneaker-card">
                    <img class="card-image" src="https://wayoff.ru/wp-content/uploads/2023/03/polaroid-1.jpg">
                    <p class="card-name">Nike Dunk SB Low Polaroid</p>
                    <p class="card-price">600₽</p>
                    <button class="card-button">купить</button>
                </div>
                <div id="nb992-yellowred" class="sneaker-card">
                    <img class="card-image" src="https://wayoff.ru/wp-content/uploads/2023/09/yellow-red-1.jpg">
                    <p class="card-name">New Balance 992 «Yellow Red»</p>
                    <p class="card-price">600₽</p>
                    <button class="card-button">купить</button>
                </div>
                <div id="jrd4-firered2020" class="sneaker-card">
                    <img class="card-image" src="https://wayoff.ru/wp-content/uploads/2023/09/fire-red-gs-1.jpg">
                    <p class="card-name">Jordan 4 Retro GS «Fire Red 2020»</p>
                    <p class="card-price">600₽</p>
                    <button class="card-button">купить</button>
                </div>
                <div id="jrd1-brushstroke" class="sneaker-card">
                    <img class="card-image" src="https://wayoff.ru/wp-content/uploads/2023/09/Brushstroke-1.jpg">
                    <p class="card-name">Jordan 1 Mid SE «Brushstroke»</p>
                    <p class="card-price">600₽</p>
                    <button class="card-button">купить</button>
                </div>
                <div id="jrd1-chinesenewyear" class="sneaker-card">
                    <img class="card-image" src="https://m.kickz4u.ru/userfiles/Novosti2020_9/Air-Jordan-1-Low-CNY-Chinese-New-Year-DD2233-001-Release-Date.jpg">
                    <p class="card-name">Jordan 1 Low OG «Lunar New Year»</p>
                    <p class="card-price">600₽</p>
                    <button class="card-button">купить</button>
                </div>
            </div>
        </main>
        <footer>
            <a id="footer-link" href="https://github.com/shertowns">github</a>
        </footer>
    </body>
</html>
